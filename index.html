<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Upload App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background-color: #f9f9f9;
    }
    h2 {
      color: #333;
    }
    input[type="file"] {
      margin-bottom: 10px;
    }
    button {
      padding: 6px 12px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-left: 5px;
    }
    button:hover {
      background-color: #0056b3;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
    li {
      margin: 5px 0;
    }
    a {
      text-decoration: none;
      color: #007bff;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h2>Upload File</h2>
  <input type="file" id="fileInput" />
  <button id="uploadBtn">Upload</button>

  <h2>Uploaded Files</h2>
  <ul id="fileList"></ul>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <script>
    // ------------------------
    // 1. Supabase Setup (Safe)
    // ------------------------
    const supabaseUrl = 'https://YOUR_PROJECT_REF.supabase.co'; // <-- replace
    const supabaseKey = 'YOUR_ANON_KEY'; // <-- replace

    if (typeof supabase === "undefined") {
      var supabase = supabase.createClient(supabaseUrl, supabaseKey);
    }

    const bucketName = 'my-public-bucket'; // <-- replace with your bucket
    const fileListEl = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');

    // ------------------------
    // 2. Upload File Function
    // ------------------------
    async function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) return alert('Please select a file');

      const { data, error } = await supabase
        .storage
        .from(bucketName)
        .upload(file.name, file, { upsert: true });

      if (error) {
        console.error('Upload failed:', error.message);
        alert('Upload failed: ' + error.message);
      } else {
        alert('Upload successful!');
        fileInput.value = '';
        loadFileList();
      }
    }

    // ------------------------
    // 3. Load Uploaded Files
    // ------------------------
    async function loadFileList() {
      const { data: files, error } = await supabase
        .storage
        .from(bucketName)
        .list('', { limit: 100, offset: 0 });

      if (error) {
        console.error('Error fetching files:', error.message);
        return;
      }

      fileListEl.innerHTML = '';

      files.forEach(file => {
        const { publicUrl } = supabase
          .storage
          .from(bucketName)
          .getPublicUrl(file.name);

        const li = document.createElement('li');
        li.innerHTML = `<a href="${publicUrl}" target="_blank">${file.name}</a>`;
        fileListEl.appendChild(li);
      });
    }

    // ------------------------
    // 4. Add Event Listener to Upload Button
    // ------------------------
    uploadBtn.addEventListener('click', uploadFile);

    // ------------------------
    // 5. Load file list on page load
    // ------------------------
    window.onload = loadFileList;
  </script>

</body>
</html>
